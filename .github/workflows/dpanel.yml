name: Download dpanel Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull dpanel Image
        run: docker pull dpanel/dpanel:latest

      - name: Save to File
        run: docker save -o dpanel-latest.tar dpanel/dpanel:latest

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dpanel-image
          path: dpanel-latest.tar
          retention-days: 1

name: Download nextcloud Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Pull nextcloud Image
        run: docker pull --pull always nextcloud

      - name: Save to File
        run: docker save -o nextcloud-latest.tar nextcloud:latest

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: nextcloud-image
          path: nextcloud-latest.tar
          retention-days: 1

name: OpenClaw Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull OpenClaw Image
        run: docker pull ghcr.io/openclaw/openclaw:latest

      - name: Save to File
        run: docker save -o openclaw-latest.tar ghcr.io/openclaw/openclaw:latest

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: OpenClaw Image
          path:  openclaw-latest.tar
          retention-days: 1
